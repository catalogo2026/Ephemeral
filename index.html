<!DOCTYPE html>
<html lang="es">
<head>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAdpDQZgSZgIue7NY0FZ_acUgy0BYnahOc",
      authDomain: "ephemeral-93275.firebaseapp.com",
      projectId: "ephemeral-93275",
      storageBucket: "ephemeral-93275.firebasestorage.app",
      messagingSenderId: "834738629296",
      appId: "1:834738629296:web:4dc2ad46ed8a2142522975"

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

</head>

<body class="bg-black text-white min-h-screen flex flex-col">

  <!-- HEADER -->
<header class="bg-white shadow-md py-4 border-b border-zinc-800 sticky top-0 z-40 md:pl-16">
      <div class="max-w-7xl mx-auto flex items-center justify-between px-4 gap-4">

      <!-- Botón menú móvil -->
      <button id="btnMenuMovil" class="md:hidden text-black text-2xl">☰</button>

      <!-- Logo centro (click = inicio) -->
        <div class="flex-1 flex justify-center">
          <img src="images/LogoCompleto.png" alt="Logo EPHEMERAL" class="h-12 object-contain cursor-pointer" onclick="irInicio()">
 
        </div>

      <!-- Buscador + Carrito -->
      <div class="flex items-center gap-3">
        <input id="inputBuscador"
               type="text"
               placeholder="Buscar..."
               class="hidden sm:block border border-gray-300 rounded-lg px-3 py-2 text-black text-sm w-32 md:w-56 focus:outline-none focus:ring-2 focus:ring-black"
               oninput="filtrarProductos()">
<a href="admin.html" id="linkAdmin" class="hidden text-black text-xl" title="Panel Admin">⚙️</a>
        <button onclick="toggleCarrito()" class="relative text-black text-2xl">
          🛒
          <span id="contadorCarrito" class="absolute -top-2 -right-2 bg-green-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
        </button>
      </div>

    </div>

    <!-- Buscador móvil (debajo, solo pantallas chicas) -->
    <div class="sm:hidden px-4 mt-3">
      <input id="inputBuscadorMovil"
             type="text"
             placeholder="Buscar productos..."
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-black text-sm focus:outline-none focus:ring-2 focus:ring-black"
             oninput="filtrarProductos()">
    </div>
  </header>

<div class="flex flex-1 md:pl-16">
  
    <!-- SIDEBAR CATEGORÍAS (hover en desktop) -->
<aside id="sidebar" class="hidden md:flex group fixed top-0 left-0 h-screen w-16 hover:w-56 bg-white border-r border-gray-200 p-4 sidebar-scroll overflow-y-auto overflow-x-hidden transition-all duration-300 flex-col z-50">
  <div class="flex md:group-hover:hidden justify-center items-center h-12 mb-4">
    <span class="text-2xl text-black">☰</span>
  </div>
  <h2 class="text-sm font-semibold text-gray-500 uppercase mb-4 whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity duration-200">
    Categorías
  </h2>
  <ul id="listaCategorias" class="space-y-2 hidden group-hover:block">
    <li>
      <button onclick="filtrarCategoria('todos')" class="categoria-btn w-full text-left px-3 py-2 rounded-lg hover:bg-gray-100 transition text-sm font-medium bg-gray-100 text-black whitespace-nowrap">
        Todos
      </button>
    </li>
  </ul>

  <!-- LOGIN USUARIO (abajo del sidebar desktop) -->
  <div class="mt-auto pt-4 border-t border-gray-200">
    <button id="btnLogin" onclick="iniciarSesionGoogle()" class="w-full flex items-center gap-3 px-1 py-2 rounded-lg hover:bg-gray-100 transition text-sm font-medium text-black whitespace-nowrap">
      <span class="text-xl">👤</span>
      <span class="opacity-0 group-hover:opacity-100 transition-opacity duration-200">Iniciar sesión</span>
    </button>
    <div id="usuarioInfo" class="hidden items-center gap-2 px-1 py-2">
      <img id="fotoUsuario" class="w-8 h-8 rounded-full flex-shrink-0" src="">
      <div class="whitespace-nowrap overflow-hidden opacity-0 group-hover:opacity-100 transition-opacity duration-200">
        <p id="nombreUsuario" class="text-xs font-medium text-black truncate"></p>
        <button onclick="cerrarSesionUsuario()" class="text-xs text-gray-500 hover:underline">Salir</button>
      </div>
    </div>
  </div>
</aside>


    <!-- Sidebar móvil (overlay) -->
    <div id="sidebarMovil" class="hidden fixed inset-0 bg-black/70 z-50 md:hidden">
      <aside class="w-64 bg-zinc-900 h-full p-4 overflow-y-auto flex flex-col">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-sm font-semibold text-gray-400 uppercase">Categorías</h2>
          <button onclick="toggleMenuMovil()" class="text-white text-xl">✕</button>
        </div>
        <ul id="listaCategoriasMovil" class="space-y-2"></ul>

        <!-- LOGIN USUARIO (abajo del sidebar móvil) -->
        <div class="mt-auto pt-4 border-t border-zinc-700">
          <button id="btnLoginMovil" onclick="iniciarSesionGoogle()" class="w-full text-left px-3 py-2 rounded-lg hover:bg-zinc-800 transition text-sm font-medium text-white">
            👤 Iniciar sesión
          </button>
          <div id="usuarioInfoMovil" class="hidden items-center gap-2 px-3 py-2">
            <img id="fotoUsuarioMovil" class="w-8 h-8 rounded-full flex-shrink-0" src="">
            <div class="overflow-hidden">
              <p id="nombreUsuarioMovil" class="text-xs font-medium text-white truncate"></p>
              <button onclick="cerrarSesionUsuario()" class="text-xs text-gray-400 hover:underline">Salir</button>
            </div>
          </div>
        </div>
      </aside>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="flex-1 p-6">
      <div id="productos-container" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4"></div>
      <p id="sinResultados" class="hidden text-center text-gray-500 mt-10">No se encontraron productos.</p>
    </main>

  </div>

  <!-- CARRITO LATERAL -->
  <div id="carritoOverlay" class="hidden fixed inset-0 bg-black/70 z-50">
    <div class="absolute right-0 top-0 w-full sm:w-96 h-full bg-zinc-900 p-6 overflow-y-auto">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold">Tu Carrito</h2>
        <button onclick="toggleCarrito()" class="text-2xl">✕</button>
      </div>

      <div id="carritoItems" class="space-y-4"></div>

      <p id="carritoVacio" class="text-gray-500 text-center mt-6">Tu carrito está vacío</p>

      <div id="carritoTotal" class="hidden mt-6 border-t border-zinc-700 pt-4">
        <div class="flex justify-between text-lg font-semibold mb-4">
          <span>Total:</span>
          <span id="totalPrecio">$0 MXN</span>
        </div>
        <button onclick="window.location.href='pedido.html'" class="w-full bg-green-500 hover:bg-green-600 transition text-white py-3 rounded-lg font-semibold">
          Finalizar pedido
        </button>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
<footer class="bg-white text-black border-t border-gray-200">
  <div class="max-w-7xl mx-auto px-4 py-4 grid grid-cols-1 md:grid-cols-3 items-center text-center gap-3">
    <div class="flex justify-center md:justify-start">
      <img src="images/Logo.png" alt="Logo EPHEMERAL" class="h-8 object-contain">
    </div>
    <div>
      <h3 class="text-sm font-semibold tracking-wide">EPHEMERAL</h3>
      <p class="text-xs text-gray-600">Calidad • Estilo • Exclusividad</p>
      <div class="mt-1 flex items-center justify-center gap-2">
        <a href="https://instagram.com/ephemeral_gym_clothes" target="_blank" rel="noopener noreferrer" class="flex items-center gap-1 group transition">
          <img src="images/LogoInsta.png" alt="Instagram EPHEMERAL" class="h-4 w-4 object-contain">
          <span class="text-xs text-gray-700 font-medium border-b border-transparent group-hover:border-black transition duration-300">
            ephemeral_gym_clothes
          </span>
        </a>
      </div>
    </div>
    <div class="flex justify-center md:justify-end">
      <img src="images/LogoLetras.png" alt="Logo letras EPHEMERAL" class="h-8 object-contain">
    </div>
  </div>
</footer>

  <script>
    let todosLosProductos = [];
    let carrito = JSON.parse(sessionStorage.getItem('carrito')) || [];
    let categoriaActiva = 'todos';
    let usuarioActual = null;

    async function cargarProductos() {
      try {
        const snapshot = await db.collection('productos').get();
        todosLosProductos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        generarCategorias();
        renderizarProductos(todosLosProductos);
        actualizarCarritoUI();
      } catch (error) {
        console.error('Error al cargar productos:', error);
      }
    }

    function generarCategorias() {
      const categorias = [...new Set(todosLosProductos.map(p => p.categoria))];
      const listaDesktop = document.getElementById('listaCategorias');
      const listaMovil = document.getElementById('listaCategoriasMovil');

      let htmlMovil = `<li><button onclick="filtrarCategoria('todos'); toggleMenuMovil()" class="w-full text-left px-3 py-2 rounded-lg hover:bg-zinc-800 transition text-sm font-medium text-white">Todos</button></li>`;

      categorias.forEach(cat => {
        const nombreBonito = cat.charAt(0).toUpperCase() + cat.slice(1);
        listaDesktop.innerHTML += `
          <li>
<button onclick="filtrarCategoria('${cat}')" class="categoria-btn w-full text-left px-3 py-2 rounded-lg hover:bg-gray-100 transition text-sm font-medium text-black">
                ${nombreBonito}
            </button>
          </li>`;
        htmlMovil += `
          <li>
            <button onclick="filtrarCategoria('${cat}'); toggleMenuMovil()" class="w-full text-left px-3 py-2 rounded-lg hover:bg-zinc-800 transition text-sm font-medium text-white">
              ${nombreBonito}
            </button>
          </li>`;
      });

      listaMovil.innerHTML = htmlMovil;
    }

    function filtrarCategoria(categoria) {
      categoriaActiva = categoria;

      document.querySelectorAll('.categoria-btn').forEach(btn => btn.classList.remove('bg-gray-100'));
event.target.classList.add('bg-gray-100');

      filtrarProductos();
    }

    function filtrarProductos() {
      const textoBusqueda = (document.getElementById('inputBuscador').value ||
                              document.getElementById('inputBuscadorMovil').value || '').toLowerCase();

      let filtrados = todosLosProductos;

      if (categoriaActiva !== 'todos') {
        filtrados = filtrados.filter(p => p.categoria === categoriaActiva);
      }

      if (textoBusqueda) {
        filtrados = filtrados.filter(p => p.nombre.toLowerCase().includes(textoBusqueda));
      }

      renderizarProductos(filtrados);
    }

    function renderizarProductos(productos) {
      const container = document.getElementById('productos-container');
      const sinResultados = document.getElementById('sinResultados');

      container.innerHTML = '';

      if (productos.length === 0) {
        sinResultados.classList.remove('hidden');
        return;
      }
      sinResultados.classList.add('hidden');

      productos.forEach(producto => {
        const productoHTML = `
          <div class="bg-zinc-900 rounded-xl shadow-lg p-3 hover:scale-105 transition duration-300 cursor-pointer" onclick="window.location.href='producto.html?id=${producto.id}'">
            <img src="${producto.imagenes[0]}"
                 alt="${producto.nombre}"
                 loading="lazy"
                 class="rounded-lg mb-3 w-full h-[220px] object-cover">

            <h3 class="text-base font-semibold truncate">${producto.nombre}</h3>
            <p class="text-gray-400 text-sm mb-2">$${producto.precio} MXN</p>

            <button class="w-full bg-green-500 hover:bg-green-600 transition text-white px-4 py-2 rounded-lg text-sm font-semibold">
              Compra ya
            </button>
          </div>`;
        container.innerHTML += productoHTML;
      });
    }

    function cambiarImagen(id, nuevaSrc) {
      document.getElementById(id).src = nuevaSrc;
    }

    // ===== CARRITO =====
    function agregarAlCarrito(producto) {
      const existente = carrito.find(item => item.id === producto.id);
      if (existente) {
        existente.cantidad += 1;
      } else {
        carrito.push({ ...producto, cantidad: 1 });
      }
      guardarCarrito();
      actualizarCarritoUI();
      toggleCarrito();
    }

    function quitarDelCarrito(id) {
      carrito = carrito.filter(item => item.id !== id);
      guardarCarrito();
      actualizarCarritoUI();
    }

    function cambiarCantidad(id, delta) {
      const item = carrito.find(i => i.id === id);
      if (!item) return;
      item.cantidad += delta;
      if (item.cantidad <= 0) {
        quitarDelCarrito(id);
      } else {
        guardarCarrito();
        actualizarCarritoUI();
      }
    }

    function guardarCarrito() {
      sessionStorage.setItem('carrito', JSON.stringify(carrito));
    }

    function actualizarCarritoUI() {
      const contador = document.getElementById('contadorCarrito');
      const totalItems = carrito.reduce((sum, item) => sum + item.cantidad, 0);
      contador.textContent = totalItems;

      const carritoItems = document.getElementById('carritoItems');
      const carritoVacio = document.getElementById('carritoVacio');
      const carritoTotal = document.getElementById('carritoTotal');

      if (carrito.length === 0) {
        carritoItems.innerHTML = '';
        carritoVacio.classList.remove('hidden');
        carritoTotal.classList.add('hidden');
        return;
      }

      carritoVacio.classList.add('hidden');
      carritoTotal.classList.remove('hidden');

      let total = 0;
      carritoItems.innerHTML = carrito.map(item => {
        total += item.precio * item.cantidad;
        return `
          <div class="flex gap-3 items-center bg-zinc-800 rounded-lg p-3">
            <img src="${item.imagenes[0]}" class="w-16 h-16 object-cover rounded">
            <div class="flex-1">
              <p class="text-sm font-medium">${item.nombre}</p>
              <p class="text-xs text-gray-400">Talla: ${item.talla || 'Única'} · $${item.precio} MXN</p>
              <div class="flex items-center gap-2 mt-1">
                <button onclick="cambiarCantidad('${item.claveUnica || item.id}', -1)" class="bg-zinc-700 w-6 h-6 rounded text-sm">-</button>
                <span class="text-sm">${item.cantidad}</span>
                <button onclick="cambiarCantidad('${item.claveUnica || item.id}', 1)" class="bg-zinc-700 w-6 h-6 rounded text-sm">+</button>
              </div>
            </div>
            <button onclick="quitarDelCarrito('${item.claveUnica || item.id}')" class="text-red-500 text-sm">✕</button>
          </div>`;
      }).join('');

      document.getElementById('totalPrecio').textContent = `$${total} MXN`;
    }

    function toggleCarrito() {
      document.getElementById('carritoOverlay').classList.toggle('hidden');
    }

    function toggleMenuMovil() {
      document.getElementById('sidebarMovil').classList.toggle('hidden');
    }

    function irInicio() {
      categoriaActiva = 'todos';
      document.getElementById('inputBuscador').value = '';
      document.getElementById('inputBuscadorMovil').value = '';
      renderizarProductos(todosLosProductos);
    }

    // ===== LOGIN USUARIO (Google) =====
    function iniciarSesionGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider).catch(error => {
        console.error('Error al iniciar sesión:', error);
      });
    }

    function cerrarSesionUsuario() {
      auth.signOut();
    }

    auth.onAuthStateChanged(user => {
      usuarioActual = user;

      const linkAdmin = document.getElementById('linkAdmin');
      if (user && user.email === 'ephemeralpagweb@gmail.com') {
        linkAdmin.classList.remove('hidden');
      } else {
        linkAdmin.classList.add('hidden');
      }

      const btnLogin = document.getElementById('btnLogin');
      const usuarioInfo = document.getElementById('usuarioInfo');
      const fotoUsuario = document.getElementById('fotoUsuario');

      const btnLoginMovil = document.getElementById('btnLoginMovil');
      const usuarioInfoMovil = document.getElementById('usuarioInfoMovil');
      const fotoUsuarioMovil = document.getElementById('fotoUsuarioMovil');
      const nombreUsuarioMovil = document.getElementById('nombreUsuarioMovil');

      if (user) {
        btnLogin.classList.add('hidden');
        usuarioInfo.classList.remove('hidden');
        usuarioInfo.classList.add('flex');
        fotoUsuario.src = user.photoURL || 'images/Logo.png';

        btnLoginMovil.classList.add('hidden');
        usuarioInfoMovil.classList.remove('hidden');
        usuarioInfoMovil.classList.add('flex');
        fotoUsuarioMovil.src = user.photoURL || 'images/Logo.png';
        nombreUsuarioMovil.textContent = user.displayName || user.email;
      } else {
        btnLogin.classList.remove('hidden');
        usuarioInfo.classList.add('hidden');
        usuarioInfo.classList.remove('flex');

        btnLoginMovil.classList.remove('hidden');
        usuarioInfoMovil.classList.add('hidden');
        usuarioInfoMovil.classList.remove('flex');
      }
    });

    document.getElementById('btnMenuMovil').addEventListener('click', toggleMenuMovil);

    window.addEventListener('DOMContentLoaded', cargarProductos);
  </script>

</body>
</html>
