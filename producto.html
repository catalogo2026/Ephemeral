<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Producto - EPHEMERAL</title>
  <link rel="icon" type="image/png" href="images/Logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .sidebar-scroll::-webkit-scrollbar { width: 4px; }
    .sidebar-scroll::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
    .zoom-container { cursor: zoom-in; overflow: hidden; }
    .zoom-container img { transition: transform 0.2s ease; }
    .zoom-container.zoomed img { cursor: zoom-out; }
  </style>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAdpDQZgSZgIue7NY0FZ_acUgy0BYnahOc",
      authDomain: "ephemeral-93275.firebaseapp.com",
      projectId: "ephemeral-93275",
      storageBucket: "ephemeral-93275.firebasestorage.app",
      messagingSenderId: "834738629296",
      appId: "1:834738629296:web:4dc2ad46ed8a2142522975"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
  </script>
</head>

<body class="bg-black text-white min-h-screen flex flex-col">

  <!-- HEADER -->
  <header class="bg-white shadow-md py-4 border-b border-zinc-800 sticky top-0 z-40 md:pl-16">
    <div class="max-w-7xl mx-auto flex items-center justify-between px-4 gap-4">
      <button id="btnMenuMovil" class="md:hidden text-black text-2xl">☰</button>
      <div class="flex-1 flex justify-center">
        <a href="index.html">
          <img src="images/LogoCompleto.png" alt="Logo EPHEMERAL" class="h-12 object-contain cursor-pointer">
        </a>
      </div>
      <div class="flex items-center gap-3">
        <a href="admin.html" class="text-black text-xl" title="Panel Admin">⚙️</a>
        <a href="index.html" class="relative text-black text-2xl" title="Ver carrito">
          🛒
        </a>
      </div>
    </div>
  </header>

  <div class="flex flex-1 md:pl-16">

    <!-- SIDEBAR (igual que index) -->
    <aside id="sidebar" class="hidden md:flex group fixed top-0 left-0 h-screen w-16 hover:w-56 bg-white border-r border-gray-200 p-4 sidebar-scroll overflow-y-auto overflow-x-hidden transition-all duration-300 flex-col z-50">
      <div class="flex md:group-hover:hidden justify-center items-center h-12 mb-4">
        <span class="text-2xl text-black">☰</span>
      </div>
      <h2 class="text-sm font-semibold text-gray-500 uppercase mb-4 whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity duration-200">
        Categorías
      </h2>
      <ul id="listaCategorias" class="space-y-2 hidden group-hover:block">
        <li>
          <a href="index.html" class="w-full block text-left px-3 py-2 rounded-lg hover:bg-gray-100 transition text-sm font-medium text-black whitespace-nowrap">
            ← Ver catálogo
          </a>
        </li>
      </ul>

      <div class="mt-auto pt-4 border-t border-gray-200">
        <button id="btnLogin" onclick="iniciarSesionGoogle()" class="w-full flex items-center gap-3 px-1 py-2 rounded-lg hover:bg-gray-100 transition text-sm font-medium text-black whitespace-nowrap">
          <span class="text-xl">👤</span>
          <span class="opacity-0 group-hover:opacity-100 transition-opacity duration-200">Iniciar sesión</span>
        </button>
        <div id="usuarioInfo" class="hidden items-center gap-2 px-1 py-2">
          <img id="fotoUsuario" class="w-8 h-8 rounded-full flex-shrink-0" src="">
          <div class="whitespace-nowrap overflow-hidden opacity-0 group-hover:opacity-100 transition-opacity duration-200">
            <p id="nombreUsuario" class="text-xs font-medium text-black truncate"></p>
            <button onclick="cerrarSesionUsuario()" class="text-xs text-gray-500 hover:underline">Salir</button>
          </div>
        </div>
      </div>
    </aside>

    <!-- Sidebar móvil -->
    <div id="sidebarMovil" class="hidden fixed inset-0 bg-black/70 z-50 md:hidden">
      <aside class="w-64 bg-zinc-900 h-full p-4 overflow-y-auto flex flex-col">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-sm font-semibold text-gray-400 uppercase">Menú</h2>
          <button onclick="toggleMenuMovil()" class="text-white text-xl">✕</button>
        </div>
        <a href="index.html" class="w-full block text-left px-3 py-2 rounded-lg hover:bg-zinc-800 transition text-sm font-medium text-white">
          ← Ver catálogo
        </a>
      </aside>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="flex-1 p-4 md:p-8">
      <div id="cargando" class="text-center text-gray-400 py-20">Cargando producto...</div>

      <div id="detalleProducto" class="hidden max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-10">

        <!-- IMAGEN CON ZOOM -->
        <div>
          <div id="zoomContainer" class="zoom-container bg-zinc-900 rounded-2xl mb-4">
            <img id="imgPrincipal" src="" alt="" class="w-full h-[400px] md:h-[500px] object-cover rounded-2xl">
          </div>
          <div id="miniaturas" class="flex gap-3 justify-center flex-wrap"></div>
          <p class="text-xs text-gray-500 text-center mt-2">Toca la imagen para ampliar</p>
        </div>

        <!-- INFO PRODUCTO -->
        <div>
          <h1 id="nombreProducto" class="text-2xl md:text-3xl font-bold mb-2"></h1>
          <p id="precioProducto" class="text-xl text-green-400 font-semibold mb-4"></p>
          <p id="descripcionProducto" class="text-gray-400 mb-6"></p>

          <!-- TALLAS -->
          <div class="mb-6">
            <p class="text-sm font-semibold text-gray-300 mb-2">Talla</p>
            <div id="selectorTallas" class="flex gap-2 flex-wrap"></div>
          </div>

          <!-- CANTIDAD -->
          <div class="mb-6">
            <p class="text-sm font-semibold text-gray-300 mb-2">Cantidad</p>
            <div class="flex items-center gap-3">
              <button onclick="cambiarCantidadProducto(-1)" class="bg-zinc-800 hover:bg-zinc-700 transition w-10 h-10 rounded-lg text-xl">−</button>
              <input id="inputCantidad" type="text" readonly value="1" class="w-14 text-center bg-zinc-900 rounded-lg py-2 text-lg">
              <button onclick="cambiarCantidadProducto(1)" class="bg-zinc-800 hover:bg-zinc-700 transition w-10 h-10 rounded-lg text-xl">+</button>
              <span id="stockDisponible" class="text-xs text-gray-500 ml-2"></span>
            </div>
          </div>

          <p id="errorSeleccion" class="text-red-500 text-sm mb-3 hidden">Selecciona una talla antes de continuar</p>

          <!-- BOTONES -->
          <div class="flex flex-col gap-3">
            <button onclick="agregarAlCarritoDetalle()" class="w-full bg-zinc-700 hover:bg-zinc-600 transition text-white py-3 rounded-lg font-semibold">
              Añadir al carrito
            </button>
            <button onclick="comprarAhora()" class="w-full bg-green-500 hover:bg-green-600 transition text-white py-3 rounded-lg font-semibold">
              Comprar ahora
            </button>
          </div>
        </div>

      </div>

      <p id="productoNoEncontrado" class="hidden text-center text-gray-500 py-20">Producto no encontrado.</p>
    </main>
  </div>

  <!-- MODAL ZOOM -->
  <div id="modalZoom" class="hidden fixed inset-0 bg-black/95 z-[100] items-center justify-center p-4">
    <button onclick="cerrarZoom()" class="absolute top-4 right-4 text-white text-3xl">✕</button>
    <img id="imgZoom" src="" class="max-w-full max-h-full object-contain">
  </div>

  <script>
    const TALLAS_DEFAULT = ["Chica", "Mediana", "Grande", "Extra Grande"];
    let producto = null;
    let tallaSeleccionada = null;
    let cantidadSeleccionada = 1;
    let carrito = JSON.parse(sessionStorage.getItem('carrito')) || [];

    // Obtener ID del producto desde la URL
    const params = new URLSearchParams(window.location.search);
    const productoId = params.get('id');

    async function cargarProducto() {
      if (!productoId) {
        mostrarNoEncontrado();
        return;
      }
      try {
        const doc = await db.collection('productos').doc(productoId).get();
        if (!doc.exists) {
          mostrarNoEncontrado();
          return;
        }
        producto = { id: doc.id, ...doc.data() };
        renderizarProducto();
      } catch (error) {
        console.error(error);
        mostrarNoEncontrado();
      }
    }

    function mostrarNoEncontrado() {
      document.getElementById('cargando').classList.add('hidden');
      document.getElementById('productoNoEncontrado').classList.remove('hidden');
    }

    function renderizarProducto() {
      document.getElementById('cargando').classList.add('hidden');
      document.getElementById('detalleProducto').classList.remove('hidden');

      document.getElementById('nombreProducto').textContent = producto.nombre;
      document.getElementById('precioProducto').textContent = `$${producto.precio} MXN`;
      document.getElementById('descripcionProducto').textContent = producto.descripcion || '';
      document.getElementById('stockDisponible').textContent = `Stock disponible: ${producto.stock}`;

      document.getElementById('imgPrincipal').src = producto.imagenes[0];

      const miniaturas = document.getElementById('miniaturas');
      miniaturas.innerHTML = producto.imagenes.map((img, i) => `
        <img src="${img}" onclick="cambiarImagenPrincipal('${img}')"
             class="h-16 w-16 object-cover rounded-lg cursor-pointer border-2 border-transparent hover:border-white transition">
      `).join('');

      const tallas = (producto.tallas && producto.tallas.length > 0) ? producto.tallas : TALLAS_DEFAULT;
      const selectorTallas = document.getElementById('selectorTallas');
      selectorTallas.innerHTML = tallas.map(t => `
        <button onclick="seleccionarTalla('${t}', this)" class="talla-btn px-4 py-2 rounded-lg border border-zinc-600 hover:border-white transition text-sm">
          ${t}
        </button>
      `).join('');
    }

    function cambiarImagenPrincipal(src) {
      document.getElementById('imgPrincipal').src = src;
    }

    function seleccionarTalla(talla, btn) {
      tallaSeleccionada = talla;
      document.querySelectorAll('.talla-btn').forEach(b => {
        b.classList.remove('bg-white', 'text-black', 'border-white');
      });
      btn.classList.add('bg-white', 'text-black', 'border-white');
      document.getElementById('errorSeleccion').classList.add('hidden');
    }

    function cambiarCantidadProducto(delta) {
      const nueva = cantidadSeleccionada + delta;
      if (nueva < 1) return;
      if (nueva > producto.stock) return;
      cantidadSeleccionada = nueva;
      document.getElementById('inputCantidad').value = cantidadSeleccionada;
    }

    function validarSeleccion() {
      if (!tallaSeleccionada) {
        document.getElementById('errorSeleccion').classList.remove('hidden');
        return false;
      }
      return true;
    }

    function guardarCarrito() {
      sessionStorage.setItem('carrito', JSON.stringify(carrito));
    }

    function agregarAlCarritoDetalle() {
      if (!validarSeleccion()) return;

      const claveUnica = `${producto.id}-${tallaSeleccionada}`;
      const existente = carrito.find(item => item.claveUnica === claveUnica);

      if (existente) {
        existente.cantidad += cantidadSeleccionada;
      } else {
        carrito.push({
          ...producto,
          talla: tallaSeleccionada,
          cantidad: cantidadSeleccionada,
          claveUnica
        });
      }

      guardarCarrito();
      alert('Producto añadido al carrito ✓');
    }

    function comprarAhora() {
      if (!validarSeleccion()) return;

      const claveUnica = `${producto.id}-${tallaSeleccionada}`;
      carrito = carrito.filter(item => item.claveUnica !== claveUnica);
      carrito.push({
        ...producto,
        talla: tallaSeleccionada,
        cantidad: cantidadSeleccionada,
        claveUnica
      });
      guardarCarrito();

      // Próximamente: redirigir a pedido.html
      window.location.href = 'index.html';
    }

    // ===== ZOOM DE IMAGEN =====
    document.getElementById('zoomContainer').addEventListener('click', () => {
      document.getElementById('imgZoom').src = document.getElementById('imgPrincipal').src;
      document.getElementById('modalZoom').classList.remove('hidden');
      document.getElementById('modalZoom').classList.add('flex');
    });

    function cerrarZoom() {
      document.getElementById('modalZoom').classList.add('hidden');
      document.getElementById('modalZoom').classList.remove('flex');
    }

    // ===== LOGIN (igual que index) =====
    function iniciarSesionGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider).catch(console.error);
    }

    function cerrarSesionUsuario() {
      auth.signOut();
    }

    auth.onAuthStateChanged(user => {
      const btnLogin = document.getElementById('btnLogin');
      const usuarioInfo = document.getElementById('usuarioInfo');
      const fotoUsuario = document.getElementById('fotoUsuario');

      if (user) {
        btnLogin.classList.add('hidden');
        usuarioInfo.classList.remove('hidden');
        usuarioInfo.classList.add('flex');
        fotoUsuario.src = user.photoURL || 'images/Logo.png';
      } else {
        btnLogin.classList.remove('hidden');
        usuarioInfo.classList.add('hidden');
        usuarioInfo.classList.remove('flex');
      }
    });

    function toggleMenuMovil() {
      document.getElementById('sidebarMovil').classList.toggle('hidden');
    }

    document.getElementById('btnMenuMovil').addEventListener('click', toggleMenuMovil);

    window.addEventListener('DOMContentLoaded', cargarProducto);
  </script>

</body>
</html>
