<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Cuenta - EPHEMERAL</title>
  <link rel="icon" type="image/png" href="images/Logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAdpDQZgSZgIue7NY0FZ_acUgy0BYnahOc",
      authDomain: "ephemeral-93275.firebaseapp.com",
      projectId: "ephemeral-93275",
      storageBucket: "ephemeral-93275.firebasestorage.app",
      messagingSenderId: "834738629296",
      appId: "1:834738629296:web:4dc2ad46ed8a2142522975"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
  </script>
</head>

<body class="bg-black text-white min-h-screen flex flex-col">

  <!-- HEADER -->
  <header class="bg-white shadow-md py-4 border-b border-zinc-800 sticky top-0 z-40">
    <div class="max-w-3xl mx-auto flex items-center justify-center px-4">
      <a href="index.html">
        <img src="images/LogoCompleto.png" alt="EPHEMERAL" class="h-12 object-contain cursor-pointer">
      </a>
    </div>
  </header>

  <!-- PANTALLA SIN SESIÓN -->
  <div id="sinSesion" class="hidden flex-1 flex items-center justify-center px-4">
    <div class="bg-zinc-900 rounded-2xl p-8 text-center max-w-sm">
      <p class="text-lg font-semibold mb-4">Inicia sesión para ver tu cuenta</p>
      <button onclick="iniciarSesionGoogle()" class="bg-green-500 hover:bg-green-600 transition px-6 py-2 rounded-lg font-semibold">
        Iniciar sesión con Google
      </button>
      <a href="index.html" class="block text-sm text-gray-400 mt-4 hover:underline">← Volver al catálogo</a>
    </div>
  </div>

  <!-- CONTENIDO DE CUENTA -->
  <div id="contenidoCuenta" class="hidden flex-1">
    <div class="max-w-2xl mx-auto p-4 md:p-6">

      <!-- Info usuario -->
      <div class="flex items-center gap-3 mb-6">
        <img id="fotoUsuario" src="" class="w-14 h-14 rounded-full">
        <div>
          <p id="nombreUsuarioTop" class="font-semibold"></p>
          <p id="correoUsuarioTop" class="text-xs text-gray-400"></p>
        </div>
      </div>

      <!-- MENÚ DE PESTAÑAS -->
      <div class="flex border-b border-zinc-700 mb-6">
        <button id="tabPerfil" onclick="cambiarTab('perfil')" class="flex-1 py-3 text-sm font-semibold border-b-2 border-green-500">
          👤 Perfil
        </button>
        <button id="tabPedidos" onclick="cambiarTab('pedidos')" class="flex-1 py-3 text-sm font-semibold text-gray-500 border-b-2 border-transparent">
          📦 Pedidos
        </button>
      </div>

      <!-- ===== TAB PERFIL ===== -->
      <div id="panelPerfil">

        <div class="bg-zinc-900 rounded-2xl p-5 mb-5">
          <label class="block text-sm text-gray-400 mb-2">Nombre para mostrar</label>
          <div class="flex gap-2">
            <input id="inputNombreCuenta" type="text" class="flex-1 px-3 py-2 rounded-lg text-black text-sm">
            <button onclick="guardarNombreCuenta()" class="bg-green-500 hover:bg-green-600 transition px-4 py-2 rounded-lg text-sm">
              Guardar
            </button>
          </div>
          <p id="mensajeNombreGuardado" class="hidden text-xs text-green-400 mt-1">Nombre actualizado ✓</p>
        </div>

        <div class="bg-zinc-900 rounded-2xl p-5 mb-5">
          <div class="flex justify-between items-center mb-3">
            <label class="block text-sm text-gray-400">Mis direcciones guardadas</label>
            <button onclick="mostrarFormNuevaDireccionCuenta()" class="text-xs text-green-400 hover:underline">+ Nueva</button>
          </div>
          <div id="listaDireccionesCuenta" class="space-y-2"></div>
          <p id="sinDireccionesCuenta" class="hidden text-xs text-gray-500 py-3">No tienes direcciones guardadas.</p>

          <div id="formDireccionCuenta" class="hidden bg-zinc-800 rounded-lg p-4 mt-3">
            <input type="hidden" id="direccionCuentaId">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-2 mb-2">
              <input id="cNombre" type="text" placeholder="Nombre completo" class="px-3 py-2 rounded-lg text-black text-sm">
              <input id="cTelefono" type="tel" placeholder="Teléfono" class="px-3 py-2 rounded-lg text-black text-sm">
            </div>

            <input id="cCP" type="text" placeholder="Código Postal (5 dígitos)" maxlength="5" inputmode="numeric"
                   oninput="buscarCP('c')" class="w-full px-3 py-2 rounded-lg text-black text-sm mb-1">
            <p id="cEstadoCP" class="hidden text-xs text-red-400 mb-1">Código postal no encontrado, verifícalo</p>
            <p id="cCargandoCP" class="hidden text-xs text-gray-400 mb-1">Buscando...</p>

            <input id="cCalle" type="text" placeholder="Calle y número" class="w-full px-3 py-2 rounded-lg text-black text-sm mb-2">

            <select id="cColonia" class="w-full px-3 py-2 rounded-lg text-black text-sm mb-1">
              <option value="">Primero ingresa tu código postal</option>
            </select>

            <button type="button" onclick="activarModoManual('c')" class="text-sm text-yellow-400 underline font-semibold hover:text-yellow-300 mb-2 block">
              ¿No te funciona? Toca aquí para escribir manualmente
            </button>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-2 mb-2">
              <input id="cCiudad" type="text" placeholder="Ciudad" readonly class="px-3 py-2 rounded-lg text-black text-sm bg-gray-200">
              <input id="cEstado" type="text" placeholder="Estado" readonly class="px-3 py-2 rounded-lg text-black text-sm bg-gray-200">
            </div>

            <textarea id="cReferencias" placeholder="Referencias (opcional)" rows="2" class="w-full px-3 py-2 rounded-lg text-black text-sm mb-3"></textarea>

            <div class="flex gap-2">
              <button onclick="guardarDireccionCuenta()" class="flex-1 bg-green-500 hover:bg-green-600 transition py-2 rounded-lg text-sm font-semibold">
                Guardar dirección
              </button>
              <button onclick="cancelarFormDireccionCuenta()" class="flex-1 bg-zinc-700 hover:bg-zinc-600 transition py-2 rounded-lg text-sm">
                Cancelar
              </button>
            </div>
          </div>
        </div>

        <button onclick="cerrarSesionUsuario()" class="w-full bg-red-500 hover:bg-red-600 transition text-white py-2 rounded-lg text-sm font-semibold">
          Cerrar sesión
        </button>
      </div>

      <!-- ===== TAB PEDIDOS ===== -->
      <div id="panelPedidos" class="hidden">
        <div id="listaMisPedidos" class="space-y-2"></div>
        <p id="sinMisPedidos" class="hidden text-center text-gray-500 py-10">Aún no has hecho ningún pedido.</p>
      </div>

    </div>
  </div>

  <script>
    let usuarioActual = null;
    let direccionesCuenta = [];

    function cambiarTab(tab) {
      const tabPerfil = document.getElementById('tabPerfil');
      const tabPedidos = document.getElementById('tabPedidos');
      const panelPerfil = document.getElementById('panelPerfil');
      const panelPedidos = document.getElementById('panelPedidos');

      if (tab === 'perfil') {
        tabPerfil.classList.add('border-green-500');
        tabPerfil.classList.remove('text-gray-500', 'border-transparent');
        tabPedidos.classList.remove('border-green-500');
        tabPedidos.classList.add('text-gray-500', 'border-transparent');
        panelPerfil.classList.remove('hidden');
        panelPedidos.classList.add('hidden');
      } else {
        tabPedidos.classList.add('border-green-500');
        tabPedidos.classList.remove('text-gray-500', 'border-transparent');
        tabPerfil.classList.remove('border-green-500');
        tabPerfil.classList.add('text-gray-500', 'border-transparent');
        panelPedidos.classList.remove('hidden');
        panelPerfil.classList.add('hidden');
        cargarMisPedidos();
      }
    }

    // ===== LOGIN =====
    function iniciarSesionGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider).catch(console.error);
    }

    function cerrarSesionUsuario() {
      auth.signOut();
      window.location.href = 'index.html';
    }

    auth.onAuthStateChanged(async user => {
      usuarioActual = user;

      if (!user) {
        document.getElementById('sinSesion').classList.remove('hidden');
        document.getElementById('sinSesion').classList.add('flex');
        document.getElementById('contenidoCuenta').classList.add('hidden');
        return;
      }

      document.getElementById('sinSesion').classList.add('hidden');
      document.getElementById('sinSesion').classList.remove('flex');
      document.getElementById('contenidoCuenta').classList.remove('hidden');

      document.getElementById('fotoUsuario').src = user.photoURL || 'images/Logo.png';
      document.getElementById('nombreUsuarioTop').textContent = user.displayName || 'Sin nombre';
      document.getElementById('correoUsuarioTop').textContent = user.email;
      document.getElementById('inputNombreCuenta').value = user.displayName || '';

      await cargarDireccionesCuenta();
    });

    // ===== PERFIL: NOMBRE =====
    async function guardarNombreCuenta() {
      const nuevoNombre = document.getElementById('inputNombreCuenta').value.trim();
      if (!nuevoNombre) return;
      try {
        await usuarioActual.updateProfile({ displayName: nuevoNombre });
        document.getElementById('nombreUsuarioTop').textContent = nuevoNombre;
        document.getElementById('mensajeNombreGuardado').classList.remove('hidden');
      } catch (error) {
        alert('Error al actualizar nombre: ' + error.message);
      }
    }

    // ===== PERFIL: DIRECCIONES =====
    async function cargarDireccionesCuenta() {
      try {
        const snapshot = await db.collection('usuarios').doc(usuarioActual.uid).collection('direcciones').get();
        direccionesCuenta = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderizarDireccionesCuenta();
      } catch (error) {
        console.error('Error al cargar direcciones:', error);
      }
    }

    function renderizarDireccionesCuenta() {
      const contenedor = document.getElementById('listaDireccionesCuenta');
      const sinDirecciones = document.getElementById('sinDireccionesCuenta');

      if (direccionesCuenta.length === 0) {
        contenedor.innerHTML = '';
        sinDirecciones.classList.remove('hidden');
        return;
      }
      sinDirecciones.classList.add('hidden');

      contenedor.innerHTML = direccionesCuenta.map(d => `
        <div class="bg-zinc-800 rounded-lg p-3 text-sm">
          <p class="font-medium">${d.nombre} · ${d.telefono}</p>
          <p class="text-gray-400 text-xs">${d.calle}, ${d.colonia}, ${d.ciudad}, ${d.estado}, CP ${d.cp}</p>
          <div class="flex gap-3 mt-2">
            <button onclick='editarDireccionCuenta(${JSON.stringify(d)})' class="text-xs text-blue-400 hover:underline">Editar</button>
            <button onclick="eliminarDireccionCuenta('${d.id}')" class="text-xs text-red-400 hover:underline">Eliminar</button>
          </div>
        </div>
      `).join('');
    }

    function mostrarFormNuevaDireccionCuenta() {
      document.getElementById('direccionCuentaId').value = '';
      document.getElementById('cNombre').value = '';
      document.getElementById('cTelefono').value = '';
      document.getElementById('cCalle').value = '';
      document.getElementById('cColonia').innerHTML = '<option value="">Primero ingresa tu código postal</option>';
      document.getElementById('cCiudad').value = '';
      document.getElementById('cEstado').value = '';
      document.getElementById('cCP').value = '';
      document.getElementById('cReferencias').value = '';
      document.getElementById('formDireccionCuenta').classList.remove('hidden');
    }

    async function editarDireccionCuenta(d) {
      document.getElementById('direccionCuentaId').value = d.id;
      document.getElementById('cNombre').value = d.nombre;
      document.getElementById('cTelefono').value = d.telefono;
      document.getElementById('cCP').value = d.cp;
      document.getElementById('cCalle').value = d.calle;
      document.getElementById('cReferencias').value = d.referencias || '';
      document.getElementById('formDireccionCuenta').classList.remove('hidden');

      await buscarCP('c');
      document.getElementById('cColonia').value = d.colonia;
      document.getElementById('cCiudad').value = d.ciudad;
      document.getElementById('cEstado').value = d.estado;
    }

    function cancelarFormDireccionCuenta() {
      document.getElementById('formDireccionCuenta').classList.add('hidden');
    }

    async function guardarDireccionCuenta() {
      const id = document.getElementById('direccionCuentaId').value;
      const direccion = {
        nombre: document.getElementById('cNombre').value.trim(),
        telefono: document.getElementById('cTelefono').value.trim(),
        calle: document.getElementById('cCalle').value.trim(),
        colonia: document.getElementById('cColonia').value.trim(),
        ciudad: document.getElementById('cCiudad').value.trim(),
        estado: document.getElementById('cEstado').value.trim(),
        cp: document.getElementById('cCP').value.trim(),
        referencias: document.getElementById('cReferencias').value.trim()
      };

      if (!direccion.nombre || !direccion.telefono || !direccion.calle || !direccion.colonia || !direccion.ciudad || !direccion.estado || !direccion.cp) {
        alert('Completa todos los campos (referencias es opcional)');
        return;
      }

      try {
        const ref = db.collection('usuarios').doc(usuarioActual.uid).collection('direcciones');
        if (id) {
          await ref.doc(id).update(direccion);
        } else {
          await ref.add(direccion);
        }
        cancelarFormDireccionCuenta();
        await cargarDireccionesCuenta();
      } catch (error) {
        alert('Error al guardar dirección: ' + error.message);
      }
    }

    async function eliminarDireccionCuenta(id) {
      if (!confirm('¿Eliminar esta dirección?')) return;
      try {
        await db.collection('usuarios').doc(usuarioActual.uid).collection('direcciones').doc(id).delete();
        await cargarDireccionesCuenta();
      } catch (error) {
        alert('Error al eliminar: ' + error.message);
      }
    }

    // ===== AUTOCOMPLETAR CÓDIGO POSTAL (SEPOMEX) =====
    async function buscarCP(prefijo) {
      const cp = document.getElementById(`${prefijo}CP`).value.trim();
      const colonia = document.getElementById(`${prefijo}Colonia`);
      const ciudad = document.getElementById(`${prefijo}Ciudad`);
      const estado = document.getElementById(`${prefijo}Estado`);
      const errorCP = document.getElementById(`${prefijo}EstadoCP`);
      const cargandoCP = document.getElementById(`${prefijo}CargandoCP`);

      if (cp.length !== 5) {
        colonia.innerHTML = '<option value="">Primero ingresa tu código postal</option>';
        ciudad.value = '';
        estado.value = '';
        return;
      }

      errorCP.classList.add('hidden');
      cargandoCP.classList.remove('hidden');
      colonia.innerHTML = '<option value="">Cargando colonias...</option>';

      try {
        const response = await fetch(`https://api-sepomex.hckdrk.mx/query/info_cp/${cp}?type=simplified`);
        const data = await response.json();

        cargandoCP.classList.add('hidden');

        if (data.error || !data.response) {
          errorCP.classList.remove('hidden');
          colonia.innerHTML = '<option value="">Código postal no válido</option>';
          ciudad.value = '';
          estado.value = '';
          return;
        }

        ciudad.value = data.response.municipio || '';
        estado.value = data.response.estado || '';

        const colonias = Array.isArray(data.response.asentamiento) ? data.response.asentamiento : [data.response.asentamiento];
        colonia.innerHTML = '<option value="">Selecciona tu colonia</option>' +
          colonias.map(c => `<option value="${c}">${c}</option>`).join('');
      } catch (error) {
        cargandoCP.classList.add('hidden');
        errorCP.classList.remove('hidden');
        colonia.innerHTML = '<option value="">Error al buscar, intenta de nuevo</option>';
        console.error(error);
      }
    }

    function activarModoManual(prefijo) {
      const colonia = document.getElementById(`${prefijo}Colonia`);
      const ciudad = document.getElementById(`${prefijo}Ciudad`);
      const estado = document.getElementById(`${prefijo}Estado`);

      const valorColonia = colonia.value;
      const inputColonia = document.createElement('input');
      inputColonia.type = 'text';
      inputColonia.id = colonia.id;
      inputColonia.placeholder = 'Colonia';
      inputColonia.value = valorColonia;
      inputColonia.className = colonia.className.replace('mb-1', 'mb-2');
      colonia.replaceWith(inputColonia);

      ciudad.readOnly = false;
      ciudad.classList.remove('bg-gray-200');
      estado.readOnly = false;
      estado.classList.remove('bg-gray-200');
    }

    // ===== TAB PEDIDOS =====
    function formatearFechaPedido(timestamp) {
      if (!timestamp) return '—';
      const fecha = timestamp.toDate ? timestamp.toDate() : new Date(timestamp.seconds * 1000);
      return fecha.toLocaleString('es-MX', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
    }

    function etiquetaEstadoPedido(estado) {
      if (estado === 'confirmado') return '<span class="text-green-400">✓ Confirmado</span>';
      if (estado === 'cancelado') return '<span class="text-red-400">✕ Cancelado</span>';
      return '<span class="text-yellow-400">⏳ Pendiente</span>';
    }

    async function cargarMisPedidos() {
      const contenedor = document.getElementById('listaMisPedidos');
      const sinPedidos = document.getElementById('sinMisPedidos');

      try {
        const snapshot = await db.collection('pedidos').where('usuarioId', '==', usuarioActual.uid).get();
        let pedidos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        pedidos.sort((a, b) => (b.fechaCreacion?.seconds || 0) - (a.fechaCreacion?.seconds || 0));

        if (pedidos.length === 0) {
          contenedor.innerHTML = '';
          sinPedidos.classList.remove('hidden');
          return;
        }
        sinPedidos.classList.add('hidden');

        contenedor.innerHTML = pedidos.map(p => `
          <div class="bg-zinc-900 rounded-lg p-4 text-sm">
            <div class="flex justify-between items-start mb-1">
              <p class="font-medium">Pedido #${p.numeroPedido}</p>
              <p class="text-xs">${etiquetaEstadoPedido(p.estado)}</p>
            </div>
            <p class="text-xs text-gray-400 mb-2">${formatearFechaPedido(p.fechaCreacion)}</p>
            <p class="text-xs text-gray-300">
              ${p.productos.map(prod => `• ${prod.nombre} (${prod.talla}) x${prod.cantidad}`).join('<br>')}
            </p>
            <p class="text-xs font-semibold mt-1">Subtotal: $${p.subtotal} MXN</p>
            ${p.estado === 'pendiente' ? `
              <button onclick="cancelarMiPedido('${p.id}')" class="mt-2 w-full bg-red-500 hover:bg-red-600 transition text-white py-1.5 rounded-lg text-xs">
                Cancelar pedido
              </button>
            ` : ''}
          </div>
        `).join('');
      } catch (error) {
        console.error('Error al cargar mis pedidos:', error);
        contenedor.innerHTML = '';
        sinPedidos.classList.remove('hidden');
      }
    }

    async function cancelarMiPedido(pedidoId) {
      if (!confirm('¿Cancelar este pedido?')) return;
      try {
        await db.collection('pedidos').doc(pedidoId).update({
          estado: 'cancelado',
          fechaCancelacion: firebase.firestore.FieldValue.serverTimestamp()
        });
        await cargarMisPedidos();
      } catch (error) {
        alert('Error al cancelar: ' + error.message);
      }
    }
  </script>

</body>
</html>
