<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin - EPHEMERAL</title>
  <link rel="icon" type="image/png" href="images/Logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAdpDQZgSZgIue7NY0FZ_acUgy0BYnahOc",
      authDomain: "ephemeral-93275.firebaseapp.com",
      projectId: "ephemeral-93275",
      storageBucket: "ephemeral-93275.firebasestorage.app",
      messagingSenderId: "834738629296",
      appId: "1:834738629296:web:4dc2ad46ed8a2142522975"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
  </script>
</head>

<body class="bg-black text-white min-h-screen">

  <!-- LOGIN -->
  <div id="loginScreen" class="min-h-screen flex items-center justify-center px-4">
    <div class="bg-zinc-900 rounded-2xl p-8 w-full max-w-sm">
      <h1 class="text-2xl font-bold mb-6 text-center">Panel Admin</h1>
      <input id="loginEmail" type="email" placeholder="Correo"
             class="w-full mb-3 px-4 py-2 rounded-lg text-black focus:outline-none">
      <input id="loginPassword" type="password" placeholder="Contraseña"
             class="w-full mb-4 px-4 py-2 rounded-lg text-black focus:outline-none">
      <button onclick="iniciarSesion()" class="w-full bg-green-500 hover:bg-green-600 transition py-2 rounded-lg font-semibold">
        Iniciar sesión
      </button>
      <p id="loginError" class="text-red-500 text-sm mt-3 text-center hidden">Correo o contraseña incorrectos</p>
      <a href="index.html" class="block text-center text-xs text-gray-400 mt-4 hover:text-white transition">
        ← Volver al catálogo
      </a>
    </div>
  </div>

  <!-- PANEL ADMIN -->
  <div id="panelAdmin" class="hidden">

    <header class="bg-white text-black py-4 px-6 flex flex-wrap justify-between items-center gap-3 shadow-md">
      <div class="flex items-center gap-4">
        <a href="index.html" class="text-sm bg-zinc-200 hover:bg-zinc-300 transition px-3 py-2 rounded-lg whitespace-nowrap">
          ← Ver catálogo
        </a>
        <h1 class="text-lg md:text-xl font-bold">Panel Admin - EPHEMERAL</h1>
      </div>
      <button onclick="togglePanelPedidos()" class="relative bg-zinc-800 text-white px-4 py-2 rounded-lg hover:bg-zinc-700 transition text-sm">
        📦 Pedidos
        <span id="contadorPendientes" class="hidden absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
      </button>
    </header>

    <div class="max-w-6xl mx-auto p-6">

      <!-- FORMULARIO AGREGAR/EDITAR -->
      <div class="bg-zinc-900 rounded-2xl p-6 mb-8">
        <h2 id="formTitulo" class="text-lg font-semibold mb-4">Agregar producto nuevo</h2>

        <input type="hidden" id="productoId">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
          <input id="fNombre" type="text" placeholder="Nombre del producto" class="px-4 py-2 rounded-lg text-black">
          <input id="fCategoria" type="text" placeholder="Categoría (ej: sueteres)" class="px-4 py-2 rounded-lg text-black">
          <input id="fPrecio" type="number" placeholder="Precio MXN" class="px-4 py-2 rounded-lg text-black">
        </div>

        <div class="mb-4">
          <label class="block text-sm text-gray-400 mb-2">Tallas y stock (deja solo una fila con "Única" si el producto no maneja tallas)</label>
          <div id="contenedorTallas" class="space-y-2 mb-2"></div>
          <button type="button" onclick="agregarFilaTalla()" class="text-xs bg-zinc-700 hover:bg-zinc-600 px-3 py-1 rounded-lg">+ Agregar talla</button>
        </div>

        <textarea id="fDescripcion" placeholder="Descripción" class="w-full px-4 py-2 rounded-lg text-black mb-4" rows="2"></textarea>

        <label class="block text-sm text-gray-400 mb-2">Imágenes del producto</label>
        <input type="file" id="fArchivoImagenes" accept="image/*" multiple
               class="w-full px-4 py-2 rounded-lg bg-zinc-800 text-white mb-2 text-sm">
        <div id="previewImagenes" class="flex gap-2 flex-wrap mb-2"></div>
        <p id="estadoSubida" class="text-xs text-gray-400 mb-4"></p>
        <input type="hidden" id="fImagenes">

        <div class="flex gap-3">
          <button onclick="guardarProducto()" class="bg-green-500 hover:bg-green-600 transition px-6 py-2 rounded-lg font-semibold">
            Guardar
          </button>
          <button onclick="limpiarFormulario()" class="bg-zinc-700 hover:bg-zinc-600 transition px-6 py-2 rounded-lg">
            Cancelar
          </button>
        </div>
      </div>

      <!-- LISTA DE PRODUCTOS -->
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-4">
        <h2 class="text-lg font-semibold">Productos existentes</h2>
        <input id="buscadorAdmin" type="text" placeholder="Buscar producto..."
               class="px-4 py-2 rounded-lg text-black text-sm w-full sm:w-64"
               oninput="filtrarProductosAdmin()">
      </div>
      <div id="listaProductos" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>

    </div>
  </div>

  <!-- PANEL LATERAL DE PEDIDOS -->
  <div id="panelPedidosOverlay" class="hidden fixed inset-0 bg-black/70 z-50">
    <div class="absolute right-0 top-0 w-full sm:w-[420px] h-full bg-zinc-900 flex flex-col">

      <div class="flex justify-between items-center p-5 border-b border-zinc-700">
        <h2 class="text-xl font-bold">Pedidos</h2>
        <button onclick="togglePanelPedidos()" class="text-2xl">✕</button>
      </div>

      <!-- TABS -->
      <div class="flex border-b border-zinc-700">
        <button id="tabPendientes" onclick="cambiarTabPedidos('pendientes')" class="flex-1 py-3 text-sm font-semibold border-b-2 border-green-500">
          Pendientes
        </button>
        <button id="tabHistorial" onclick="cambiarTabPedidos('historial')" class="flex-1 py-3 text-sm font-semibold text-gray-500 border-b-2 border-transparent">
          Historial
        </button>
      </div>

      <div class="flex-1 overflow-y-auto p-4">
        <div id="listaPedidosPendientes" class="space-y-3"></div>
        <div id="listaPedidosHistorial" class="hidden space-y-3"></div>
        <p id="sinPedidosMsg" class="hidden text-center text-gray-500 py-10">No hay pedidos pendientes.</p>
        <p id="sinHistorialMsg" class="hidden text-center text-gray-500 py-10">Aún no hay ventas confirmadas.</p>
      </div>

    </div>
  </div>

  <script>
    const IMGBB_API_KEY = "efe873ac64539ab66954ea4ad3f8330a";
    const CORREO_ADMIN = "ephemeralpagweb@gmail.com";
    let urlsImagenesSubidas = [];
    let todosLosProductosAdmin = [];
    let pedidosPendientes = [];
    let pedidosHistorial = [];

    // ===== LOGIN =====
    function iniciarSesion() {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      auth.signInWithEmailAndPassword(email, password)
        .catch(() => {
          document.getElementById('loginError').classList.remove('hidden');
        });
    }

    auth.onAuthStateChanged(user => {
      if (user && user.email === CORREO_ADMIN) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('panelAdmin').classList.remove('hidden');
        cargarListaProductos();
        cargarPedidos();
      } else {
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('panelAdmin').classList.add('hidden');
      }
    });

    // ===== TALLAS DINÁMICAS =====
    function agregarFilaTalla(nombre = '', stock = '') {
      const contenedor = document.getElementById('contenedorTallas');
      const fila = document.createElement('div');
      fila.className = 'flex gap-2 items-center talla-fila';
      fila.innerHTML = `
        <input type="text" placeholder="Nombre talla (ej: Chica)" value="${nombre}" class="talla-nombre flex-1 px-3 py-2 rounded-lg text-black text-sm">
        <input type="number" placeholder="Stock" value="${stock}" class="talla-stock w-24 px-3 py-2 rounded-lg text-black text-sm">
        <button type="button" onclick="this.parentElement.remove()" class="text-red-500 text-sm px-2">✕</button>
      `;
      contenedor.appendChild(fila);
    }

    function obtenerTallasDelFormulario() {
      const filas = document.querySelectorAll('.talla-fila');
      const tallas = [];
      filas.forEach(fila => {
        const nombre = fila.querySelector('.talla-nombre').value.trim();
        const stock = Number(fila.querySelector('.talla-stock').value) || 0;
        if (nombre) tallas.push({ nombre, stock });
      });
      return tallas;
    }

    // ===== SUBIDA DE IMÁGENES (ImgBB) =====
    document.getElementById('fArchivoImagenes').addEventListener('change', async function(e) {
      const archivos = Array.from(e.target.files);
      const estado = document.getElementById('estadoSubida');
      const preview = document.getElementById('previewImagenes');

      estado.textContent = `Subiendo ${archivos.length} imagen(es)...`;
      urlsImagenesSubidas = [];
      preview.innerHTML = '';

      for (const archivo of archivos) {
        const formData = new FormData();
        formData.append('image', archivo);

        try {
          const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
            method: 'POST',
            body: formData
          });
          const data = await response.json();

          if (data.success) {
            const url = data.data.url;
            urlsImagenesSubidas.push(url);
            preview.innerHTML += `<img src="${url}" class="w-16 h-16 object-cover rounded-lg border-2 border-green-500">`;
          }
        } catch (error) {
          estado.textContent = 'Error al subir alguna imagen';
          console.error(error);
        }
      }

      document.getElementById('fImagenes').value = urlsImagenesSubidas.join(',');
      estado.textContent = `${urlsImagenesSubidas.length} imagen(es) subida(s) correctamente ✓`;
    });

    // ===== CRUD PRODUCTOS =====
    async function guardarProducto() {
      const id = document.getElementById('productoId').value;
      const producto = {
        nombre: document.getElementById('fNombre').value,
        categoria: document.getElementById('fCategoria').value.toLowerCase(),
        precio: Number(document.getElementById('fPrecio').value),
        tallas: obtenerTallasDelFormulario(),
        descripcion: document.getElementById('fDescripcion').value,
        imagenes: document.getElementById('fImagenes').value.split(',').map(s => s.trim()).filter(Boolean)
      };

      if (!producto.nombre || !producto.categoria || !producto.precio) {
        alert('Llena al menos nombre, categoría y precio');
        return;
      }

      if (producto.tallas.length === 0) {
        alert('Agrega al menos una talla con su stock (usa "Única" si no maneja tallas)');
        return;
      }

      try {
        if (id) {
          await db.collection('productos').doc(id).update(producto);
        } else {
          await db.collection('productos').add(producto);
        }
        limpiarFormulario();
        cargarListaProductos();
      } catch (error) {
        alert('Error al guardar: ' + error.message);
      }
    }

    function calcularStockTotal(producto) {
      if (producto.tallas && producto.tallas.length > 0 && typeof producto.tallas[0] === 'object') {
        return producto.tallas.reduce((sum, t) => sum + (t.stock || 0), 0);
      }
      return producto.stock || 0;
    }

    async function cargarListaProductos() {
      const snapshot = await db.collection('productos').get();
      todosLosProductosAdmin = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      renderizarListaAdmin(todosLosProductosAdmin);
    }

    function renderizarListaAdmin(productos) {
      const contenedor = document.getElementById('listaProductos');
      contenedor.innerHTML = '';

      productos.forEach(p => {
        const stockTotal = calcularStockTotal(p);
        contenedor.innerHTML += `
          <div class="bg-zinc-900 rounded-xl p-3 flex flex-col">
            <img src="${p.imagenes[0]}" class="w-full h-32 object-cover rounded-lg mb-2">
            <p class="font-semibold text-sm truncate">${p.nombre}</p>
            <p class="text-xs text-gray-400 mb-2">$${p.precio} MXN · Stock total: ${stockTotal}</p>
            <p class="text-xs text-gray-500 mb-3">${p.categoria}</p>
            <div class="flex gap-2 mt-auto">
              <button onclick='editarProducto("${p.id}", ${JSON.stringify(p)})' class="flex-1 bg-blue-500 hover:bg-blue-600 transition px-2 py-1 rounded-lg text-xs">
                Editar
              </button>
              <button onclick="eliminarProducto('${p.id}')" class="flex-1 bg-red-500 hover:bg-red-600 transition px-2 py-1 rounded-lg text-xs">
                Eliminar
              </button>
            </div>
          </div>`;
      });
    }

    function filtrarProductosAdmin() {
      const texto = document.getElementById('buscadorAdmin').value.toLowerCase();
      const filtrados = todosLosProductosAdmin.filter(p => p.nombre.toLowerCase().includes(texto));
      renderizarListaAdmin(filtrados);
    }

    function editarProducto(id, producto) {
      document.getElementById('formTitulo').textContent = 'Editar producto';
      document.getElementById('productoId').value = id;
      document.getElementById('fNombre').value = producto.nombre;
      document.getElementById('fCategoria').value = producto.categoria;
      document.getElementById('fPrecio').value = producto.precio;
      document.getElementById('fDescripcion').value = producto.descripcion || '';
      document.getElementById('fImagenes').value = producto.imagenes.join(',');

      document.getElementById('contenedorTallas').innerHTML = '';
      if (producto.tallas && producto.tallas.length > 0 && typeof producto.tallas[0] === 'object') {
        producto.tallas.forEach(t => agregarFilaTalla(t.nombre, t.stock));
      } else {
        agregarFilaTalla('Única', producto.stock || 0);
      }

      urlsImagenesSubidas = producto.imagenes;
      document.getElementById('previewImagenes').innerHTML = producto.imagenes.map(url =>
        `<img src="${url}" class="w-16 h-16 object-cover rounded-lg border-2 border-green-500">`
      ).join('');

      window.scrollTo(0, 0);
    }

    async function eliminarProducto(id) {
      if (!confirm('¿Seguro que quieres eliminar este producto?')) return;
      await db.collection('productos').doc(id).delete();
      cargarListaProductos();
    }

    function limpiarFormulario() {
      document.getElementById('formTitulo').textContent = 'Agregar producto nuevo';
      document.getElementById('productoId').value = '';
      document.getElementById('fNombre').value = '';
      document.getElementById('fCategoria').value = '';
      document.getElementById('fPrecio').value = '';
      document.getElementById('fDescripcion').value = '';
      document.getElementById('fImagenes').value = '';
      document.getElementById('fArchivoImagenes').value = '';
      document.getElementById('previewImagenes').innerHTML = '';
      document.getElementById('estadoSubida').textContent = '';
      urlsImagenesSubidas = [];

      document.getElementById('contenedorTallas').innerHTML = '';
      agregarFilaTalla();
    }

    agregarFilaTalla();

    // ===== PANEL DE PEDIDOS =====
    function togglePanelPedidos() {
      document.getElementById('panelPedidosOverlay').classList.toggle('hidden');
      cargarPedidos();
    }

    function cambiarTabPedidos(tab) {
      const tabPendientes = document.getElementById('tabPendientes');
      const tabHistorial = document.getElementById('tabHistorial');
      const listaPendientes = document.getElementById('listaPedidosPendientes');
      const listaHistorial = document.getElementById('listaPedidosHistorial');

      if (tab === 'pendientes') {
        tabPendientes.classList.add('border-green-500');
        tabPendientes.classList.remove('text-gray-500', 'border-transparent');
        tabHistorial.classList.remove('border-green-500');
        tabHistorial.classList.add('text-gray-500', 'border-transparent');
        listaPendientes.classList.remove('hidden');
        listaHistorial.classList.add('hidden');
      } else {
        tabHistorial.classList.add('border-green-500');
        tabHistorial.classList.remove('text-gray-500', 'border-transparent');
        tabPendientes.classList.remove('border-green-500');
        tabPendientes.classList.add('text-gray-500', 'border-transparent');
        listaHistorial.classList.remove('hidden');
        listaPendientes.classList.add('hidden');
      }
    }

    async function cargarPedidos() {
      try {
        const snapshotPendientes = await db.collection('pedidos').where('estado', '==', 'pendiente').get();
        pedidosPendientes = snapshotPendientes.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        pedidosPendientes.sort((a, b) => (b.fechaCreacion?.seconds || 0) - (a.fechaCreacion?.seconds || 0));

        const snapshotHistorial = await db.collection('pedidos').where('estado', '==', 'confirmado').get();
        pedidosHistorial = snapshotHistorial.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        pedidosHistorial.sort((a, b) => (b.fechaConfirmacion?.seconds || 0) - (a.fechaConfirmacion?.seconds || 0));

        renderizarPedidosPendientes();
        renderizarHistorial();
        actualizarContadorPendientes();
      } catch (error) {
        console.error('Error al cargar pedidos:', error);
      }
    }

    function actualizarContadorPendientes() {
      const contador = document.getElementById('contadorPendientes');
      if (pedidosPendientes.length > 0) {
        contador.textContent = pedidosPendientes.length;
        contador.classList.remove('hidden');
      } else {
        contador.classList.add('hidden');
      }
    }

    function formatearFecha(timestamp) {
      if (!timestamp) return '—';
      const fecha = timestamp.toDate ? timestamp.toDate() : new Date(timestamp.seconds * 1000);
      return fecha.toLocaleString('es-MX', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
    }

    function renderizarPedidosPendientes() {
      const contenedor = document.getElementById('listaPedidosPendientes');
      const sinPedidosMsg = document.getElementById('sinPedidosMsg');

      if (pedidosPendientes.length === 0) {
        contenedor.innerHTML = '';
        sinPedidosMsg.classList.remove('hidden');
        return;
      }
      sinPedidosMsg.classList.add('hidden');

      contenedor.innerHTML = pedidosPendientes.map(p => `
        <div class="bg-zinc-800 rounded-xl p-4">
          <div class="flex justify-between items-start mb-2">
            <p class="font-semibold text-sm">Pedido #${p.numeroPedido}</p>
            <p class="text-xs text-gray-400">${formatearFecha(p.fechaCreacion)}</p>
          </div>
          <p class="text-xs text-gray-400 mb-2">${p.direccion?.nombre || 'Sin nombre'} · ${p.direccion?.telefono || ''}</p>
          <div class="text-xs text-gray-300 mb-2 space-y-1">
            ${p.productos.map(prod => `<p>• ${prod.nombre} (${prod.talla}) x${prod.cantidad}</p>`).join('')}
          </div>
          <p class="text-sm font-semibold mb-3">Subtotal: $${p.subtotal} MXN</p>
          <button onclick="confirmarVenta('${p.id}')" class="w-full bg-green-500 hover:bg-green-600 transition text-white py-2 rounded-lg text-sm font-semibold">
            Confirmar venta
          </button>
        </div>
      `).join('');
    }

    function renderizarHistorial() {
      const contenedor = document.getElementById('listaPedidosHistorial');
      const sinHistorialMsg = document.getElementById('sinHistorialMsg');

      if (pedidosHistorial.length === 0) {
        contenedor.innerHTML = '';
        sinHistorialMsg.classList.remove('hidden');
        return;
      }
      sinHistorialMsg.classList.add('hidden');

      contenedor.innerHTML = pedidosHistorial.map(p => `
        <div class="bg-zinc-800 rounded-xl p-4">
          <div class="flex justify-between items-start mb-2">
            <p class="font-semibold text-sm">Pedido #${p.numeroPedido}</p>
            <p class="text-xs text-green-400">✓ Confirmado</p>
          </div>
          <p class="text-xs text-gray-400 mb-1">${p.direccion?.nombre || 'Sin nombre'}</p>
          <p class="text-xs text-gray-500 mb-2">Vendido: ${formatearFecha(p.fechaConfirmacion)}</p>
          <p class="text-sm font-semibold mb-3">$${p.subtotal} MXN</p>
          <button onclick="deshacerConfirmacion('${p.id}')" class="w-full bg-zinc-700 hover:bg-zinc-600 transition text-white py-2 rounded-lg text-xs">
            Deshacer confirmación
          </button>
        </div>
      `).join('');
    }

    async function confirmarVenta(pedidoId) {
      if (!confirm('¿Confirmar esta venta? Se descontará el stock correspondiente.')) return;

      const pedido = pedidosPendientes.find(p => p.id === pedidoId);
      if (!pedido) return;

      try {
        // Descontar stock por cada producto/talla del pedido
        for (const item of pedido.productos) {
          const productoRef = db.collection('productos').doc(item.id);
          const productoDoc = await productoRef.get();
          if (!productoDoc.exists) continue;

          const productoData = productoDoc.data();
          if (productoData.tallas && productoData.tallas.length > 0 && typeof productoData.tallas[0] === 'object') {
            const nuevasTallas = productoData.tallas.map(t => {
              if (t.nombre === item.talla) {
                return { nombre: t.nombre, stock: Math.max(0, t.stock - item.cantidad) };
              }
              return t;
            });
            await productoRef.update({ tallas: nuevasTallas });
          }
        }

        await db.collection('pedidos').doc(pedidoId).update({
          estado: 'confirmado',
          fechaConfirmacion: firebase.firestore.FieldValue.serverTimestamp()
        });

        await cargarPedidos();
        await cargarListaProductos();
      } catch (error) {
        alert('Error al confirmar venta: ' + error.message);
      }
    }

    async function deshacerConfirmacion(pedidoId) {
      if (!confirm('¿Deshacer esta confirmación? El stock se repondrá y el pedido volverá a pendiente.')) return;

      const pedido = pedidosHistorial.find(p => p.id === pedidoId);
      if (!pedido) return;

      try {
        // Reponer stock
        for (const item of pedido.productos) {
          const productoRef = db.collection('productos').doc(item.id);
          const productoDoc = await productoRef.get();
          if (!productoDoc.exists) continue;

          const productoData = productoDoc.data();
          if (productoData.tallas && productoData.tallas.length > 0 && typeof productoData.tallas[0] === 'object') {
            const nuevasTallas = productoData.tallas.map(t => {
              if (t.nombre === item.talla) {
                return { nombre: t.nombre, stock: t.stock + item.cantidad };
              }
              return t;
            });
            await productoRef.update({ tallas: nuevasTallas });
          }
        }

        await db.collection('pedidos').doc(pedidoId).update({
          estado: 'pendiente',
          fechaConfirmacion: firebase.firestore.FieldValue.delete()
        });

        await cargarPedidos();
        await cargarListaProductos();
      } catch (error) {
        alert('Error al deshacer: ' + error.message);
      }
    }
  </script>

</body>
</html>
